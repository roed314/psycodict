# The whole of LMFDB's test suite, run against the psycodict being released.
#
# downstream.yml runs a small subset on every pull request, chosen for signal
# per second -- enough to catch an obvious break, cheap enough to sit in the
# feedback loop.  This runs everything, and is meant to gate a release: LMFDB
# is the reason psycodict exists, and "we shipped a version that breaks LMFDB"
# is the failure this repository most needs to avoid.
#
# Triggers:
#   - pushing a v* tag;
#   - manually, which is the better habit -- run it *before* tagging, since a
#     tag that fails this is a tag you have to delete.  The dispatch form also
#     takes an LMFDB ref, for checking against an LMFDB branch before it
#     merges.
#
# IMPORTANT, for whoever adds the publishing workflow: this does not gate a
# release by itself.  Two workflows triggered by the same tag run in parallel
# -- GitHub Actions does not sequence them -- so an upload would go out while
# these jobs are still running, and a PyPI version can be yanked but never
# replaced.  The agreed mechanism is a GitHub Environment named `pypi` with a
# required reviewer on the publishing job: the tag starts both, the upload
# parks awaiting approval, and you approve once these eleven groups are green.
# That also gates every future check, rather than just this one.
#
# Cost: eleven parallel jobs in the SageMath container, each pulling a
# multi-gigabyte image and installing LMFDB's dependencies, all querying the
# shared public mirror.  That is a lot to spend, which is exactly why it is
# not on the per-pull-request path.

name: LMFDB (full suite)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      lmfdb-ref:
        description: LMFDB ref to test against
        required: false
        # TRANSITION (remove-extras): default pinned to LMFDB/lmfdb#7070
        # until it merges; revert to main afterwards.
        default: refs/pull/7070/head

concurrency:
  # Deliberately no cancel-in-progress: a release run should be allowed to
  # finish even if something else lands while it is going.
  group: lmfdb-full-${{ github.ref }}

permissions:
  contents: read

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      sage: ${{ steps.sage.outputs.version }}
    steps:
      - name: Check out psycodict
        uses: actions/checkout@v7
        with:
          path: psycodict

      - name: Check out LMFDB
        uses: actions/checkout@v7
        with:
          repository: LMFDB/lmfdb
          ref: ${{ inputs.lmfdb-ref || 'refs/pull/7070/head' }}
          path: lmfdb

      # Groups come from LMFDB's own matrix_includes.json, read at run time so
      # that their balancing (the slow suites each get a group) stays current
      # without us copying it.  Anything their matrix misses is swept into a
      # final group, so this really does run every test file.
      - name: Build the job matrix
        id: plan
        run: |
          matrix=$(python3 psycodict/.github/downstream/lmfdb_matrix.py lmfdb)
          echo "$matrix" | python3 -m json.tool
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

      # Which SageMath to run LMFDB under is LMFDB's decision, not ours: their
      # .environment.yml pins the version their own CI validates against.
      # Reading it rather than pinning a number keeps us testing the
      # configuration they support, and stays right when they bump it.  Using
      # sagemath:latest instead tests whether LMFDB works on unreleased Sage,
      # which fails for reasons no psycodict change can cause.
      - name: Resolve the SageMath version
        id: sage
        run: |
          version=$(grep -oE 'sage=[0-9.]+' lmfdb/.environment.yml | head -1 | cut -d= -f2)
          if [ -z "$version" ]; then
            echo "::error::could not read the sage pin from LMFDB's .environment.yml"
            exit 1
          fi
          echo "LMFDB pins SageMath $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  test:
    name: ${{ matrix.label }}
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      # One failing group must not hide the state of the other ten -- when
      # this is gating a release you want the whole picture in one run.
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    container:
      image: sagemath/sagemath:${{ needs.plan.outputs.sage }}
      options: --user root
    steps:
      - name: Check out psycodict
        uses: actions/checkout@v7
        with:
          path: psycodict

      - name: Set up LMFDB against devmirror
        uses: ./psycodict/.github/actions/lmfdb-env
        with:
          lmfdb-ref: ${{ inputs.lmfdb-ref || 'refs/pull/7070/head' }}

      - name: Run ${{ matrix.label }}
        working-directory: lmfdb
        run: sage -python -m pytest -v --durations=20 ${{ matrix.files }}
