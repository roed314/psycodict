# Continuous integration for psycodict.
#
# Five jobs, cheapest first, so an obvious mistake fails in under a minute:
#
#   lint      static checks, no interpreter matrix, no database
#   unit      the database-free tests on every supported Python
#   database  the full suite against real PostgreSQL service containers
#   package   sdist/wheel build, twine metadata check, install smoke tests
#   docs      the Sphinx build with warnings as errors, no database
#
# The downstream regression suites (LMFDB and seminars) live in a separate
# workflow, downstream.yml, because they are an order of magnitude slower.

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install linters
        run: python -m pip install ruff

      # The rule selection lives in pyproject.toml; it is deliberately narrow
      # (correctness rules, not style) so that it stays green on a codebase
      # that predates any linting.
      - name: ruff check
        run: ruff check --output-format=github .

  unit:
    name: Unit (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install
        run: python -m pip install -e ".[pgbinary,test]"

      # These tests exercise the encoding, config and utility layers, which is
      # where the version-sensitive code is; they need no server, so they run
      # on the whole interpreter matrix rather than just the database matrix.
      - name: Run database-free tests
        run: pytest tests/test_encoding.py tests/test_utils.py tests/test_config.py -v

  database:
    name: PostgreSQL ${{ matrix.postgres }} (py${{ matrix.python }}${{ matrix.psycopg && format(', psycopg {0}', matrix.psycopg) || '' }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Rather than the full cross product, pin the corners: the oldest
      # supported pair, the newest pair, and the combination LMFDB actually
      # deploys.  Add a row here when a new PostgreSQL major is released.
      # The extra oldest-pair row pins psycopg to the declared minimum
      # (pyproject's pgbinary/pgsource floor), so the floor stays honest.
      matrix:
        include:
          - {python: "3.9", postgres: "13"}
          - {python: "3.9", postgres: "13", psycopg: "3.2.4"}
          - {python: "3.11", postgres: "15"}
          - {python: "3.12", postgres: "16"}
          - {python: "3.13", postgres: "17"}
          - {python: "3.14", postgres: "18"}
    services:
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: psycodict_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: psycodict_test
      # Turn conftest's "no server, skip the suite" fallback into a hard
      # error: in CI a missing database is a broken workflow, not a reason
      # to report success.
      PSYCODICT_TEST_DB_REQUIRED: "1"
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install
        run: python -m pip install -e ".[pgbinary,test]"

      - name: Pin psycopg to the declared minimum
        if: matrix.psycopg
        run: python -m pip install "psycopg[binary]==${{ matrix.psycopg }}"

      - name: Show server version
        run: psql -c "SELECT version()"

      - name: Run the full test suite
        run: pytest tests/ -v --durations=10

  package:
    name: Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Build sdist and wheel
        run: |
          python -m pip install build twine
          python -m build

      # Fails the build on a missing or invalid long_description, and on any
      # metadata PyPI would reject at upload time -- catching that here rather
      # than during a release is the entire point.
      - name: Check metadata
        run: twine check --strict dist/*

      # Run from outside the checkout.  This is a flat-layout project, so the
      # repository root contains a real psycodict/ package directory, and an
      # interpreter started there imports *that* in preference to anything
      # installed -- which made this check pass against a wheel with its
      # modules deleted.  Asserting where the import came from is what makes
      # the test about the wheel rather than about the source tree.
      - name: Wheel installs and imports
        run: |
          python -m venv "$RUNNER_TEMP/smoke"
          "$RUNNER_TEMP/smoke/bin/pip" install "$(echo "$PWD"/dist/*.whl)[pgbinary]"
          cd "$RUNNER_TEMP"
          smoke/bin/python - <<PY
          import importlib.metadata, os
          import psycodict
          from psycodict.database import PostgresDatabase
          from psycodict.encoding import Json
          path = os.path.realpath(psycodict.__file__)
          checkout = os.path.realpath("$GITHUB_WORKSPACE")
          assert not path.startswith(checkout + os.sep), (
              "imported the checkout rather than the installed wheel: %s" % path
          )
          assert PostgresDatabase is not None and Json is not None
          print("psycodict", importlib.metadata.version("psycodict"), "imports from", path)
          PY

      # psycopg is deliberately an optional dependency, so that users choose
      # between the pure-Python and binary builds.  Importing without it must
      # fail with the guidance in psycodict/__init__.py rather than a bare
      # ImportError -- this asserts that contract holds.
      - name: Import without psycopg gives a helpful message
        run: |
          python -m venv "$RUNNER_TEMP/bare"
          "$RUNNER_TEMP/bare/bin/pip" install "$(echo "$PWD"/dist/*.whl)"
          # Outside the checkout, for the same reason as the step above.
          cd "$RUNNER_TEMP"
          set +e
          output=$(bare/bin/python -c "import psycodict" 2>&1)
          status=$?
          set -e
          echo "$output"
          if [ $status -eq 0 ]; then
            echo "::error::importing psycodict without psycopg should fail"
            exit 1
          fi
          case "$output" in
            *psycopg\[binary\]*) echo "helpful message present" ;;
            *) echo "::error::missing the install-psycopg hint"; exit 1 ;;
          esac

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      # The package itself is installed so that autodoc can import it; no
      # database is needed (importing psycodict does not connect).
      - name: Install package and documentation dependencies
        run: |
          python -m pip install '.[pgbinary]' -r docs/requirements.txt

      # -W turns warnings into errors: a broken cross-reference or a
      # malformed docstring fails here rather than silently degrading the
      # site.  Read the Docs builds with fail_on_warning to match.
      - name: Build documentation
        run: python -m sphinx -W --keep-going -b html docs docs/_build/html
