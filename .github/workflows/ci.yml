# Continuous integration for psycodict.
#
# Four jobs, cheapest first, so an obvious mistake fails in under a minute:
#
#   lint      static checks, no interpreter matrix, no database
#   unit      the database-free tests on every supported Python
#   database  the full suite against real PostgreSQL service containers
#   package   sdist/wheel build, twine metadata check, install smoke tests
#
# The downstream regression suites (LMFDB and seminars) live in a separate
# workflow, downstream.yml, because they are an order of magnitude slower.

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install linters
        run: python -m pip install ruff

      # The rule selection lives in pyproject.toml; it is deliberately narrow
      # (correctness rules, not style) so that it stays green on a codebase
      # that predates any linting.
      - name: ruff check
        run: ruff check --output-format=github .

  unit:
    name: Unit (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install
        run: python -m pip install -e ".[pgbinary,test]"

      # These tests exercise the encoding, config and utility layers, which is
      # where the version-sensitive code is; they need no server, so they run
      # on the whole interpreter matrix rather than just the database matrix.
      - name: Run database-free tests
        run: pytest tests/test_encoding.py tests/test_utils.py tests/test_config.py -v

  database:
    name: PostgreSQL ${{ matrix.postgres }} (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Rather than the full cross product, pin the corners: the oldest
      # supported pair, the newest pair, and the combination LMFDB actually
      # deploys.  Add a row here when a new PostgreSQL major is released.
      matrix:
        include:
          - {python: "3.8", postgres: "13"}
          - {python: "3.11", postgres: "15"}
          - {python: "3.12", postgres: "16"}
          - {python: "3.13", postgres: "17"}
    services:
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: psycodict_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: psycodict_test
      # Turn conftest's "no server, skip the suite" fallback into a hard
      # error: in CI a missing database is a broken workflow, not a reason
      # to report success.
      PSYCODICT_TEST_DB_REQUIRED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install
        run: python -m pip install -e ".[pgbinary,test]"

      - name: Show server version
        run: psql -c "SELECT version()"

      - name: Run the full test suite
        run: pytest tests/ -v --durations=10

  package:
    name: Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build sdist and wheel
        run: |
          python -m pip install build twine
          python -m build

      # Fails the build on missing/!invalid long_description and on metadata
      # PyPI would reject at upload time -- catching that here rather than
      # during a release is the entire point.
      - name: Check metadata
        run: twine check --strict dist/*

      - name: Wheel installs and imports
        run: |
          python -m venv smoke
          smoke/bin/pip install "$(echo dist/*.whl)[pgbinary]"
          smoke/bin/python -c "
          import importlib.metadata, psycodict
          from psycodict.database import PostgresDatabase
          assert PostgresDatabase is not None
          print('psycodict', importlib.metadata.version('psycodict'), 'imports cleanly')
          "

      # psycopg2 is deliberately an optional dependency, so that users choose
      # between the source and binary builds.  Importing without it must fail
      # with the guidance in psycodict/__init__.py rather than a bare
      # ImportError -- this asserts that contract holds.
      - name: Import without psycopg2 gives a helpful message
        run: |
          python -m venv bare
          bare/bin/pip install "$(echo dist/*.whl)"
          set +e
          output=$(bare/bin/python -c "import psycodict" 2>&1)
          status=$?
          set -e
          echo "$output"
          if [ $status -eq 0 ]; then
            echo "::error::importing psycodict without psycopg2 should fail"
            exit 1
          fi
          case "$output" in
            *psycopg2-binary*) echo "helpful message present" ;;
            *) echo "::error::missing the install-psycopg2 hint"; exit 1 ;;
          esac

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
